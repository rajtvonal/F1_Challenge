<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>F1Challenge Results</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
/* --- UGYANAZ A STÍLUS --- */
:root {
  --bg-primary: #0a0a12;
  --bg-secondary: #10101e;
  --bg-row: #12122a;
  --bg-row-alt: #0e0e22;
  --red: #db0a40;
  --red-glow: rgba(219,10,64,0.3);
  --yellow: #ffc906;
  --text-primary: #f0f0f5;
  --text-secondary: #8888aa;
  --border: #1e1e3a;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* Glow */
.bg-glow {
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 500px;
  background: radial-gradient(ellipse, var(--red-glow) 0%, transparent 70%);
  z-index: 0;
}

/* HEADER */
.header {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 60px 20px 20px;
}

.title {
  font-size: 3rem;
  font-weight: 900;
  letter-spacing: 0.05em;
  color: var(--red);
  text-transform: uppercase;
}

.title span {
  color: var(--text-primary);
  text-shadow: 0 0 40px var(--red-glow);
}

.subtitle {
  margin-top: 20px;
  letter-spacing: 0.4em;
  font-size: 12px;
  color: var(--text-secondary);
}

.buttons {
  margin-top: 30px;
}

button {
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: white;
  padding: 15px 27px;
  margin: 20px;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  border-color: var(--red);
}

button.active {
  background: var(--red);
  border-color: var(--red);
}

.wrapper {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
}

th {
  background: var(--bg-primary);
  padding: 12px;
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--text-secondary);
  border-bottom: 2px solid var(--red);
}

td {
  padding: 8px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

tr:nth-child(even) { background: var(--bg-row-alt); }

tr:hover {
tr.top1 {
  background: rgba(255,215,0,0.08);
  border-left: 3px solid gold;
}
tr.top2 {
  background: #1a1a3a;
  background: rgba(192,192,192,0.08);
  border-left: 3px solid silver;
}
tr.top3 {
  background: rgba(205,127,50,0.08);
  border-left: 3px solid #cd7f32;
}
}

tr:hover {
  background: #1a1a3a;
}

/* Színek */
.rank-1 { color: gold; font-weight: 900; }
.rank-2 { color: silver; }
.rank-3 { color: #cd7f32; }

.name {
  font-weight: 700;
  text-align: left;
}


/* Animáció */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.row {
  animation: fadeUp 0.3s ease forwards;
}

.footer {
  text-align: center;
  font-size: 10px;
  margin: 40px 0;
  color: var(--text-secondary);
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="header">
  <div class="title">Rajtvonal <span>F1 Challenge</span></div>
  <div class="subtitle">EREDMÉNYEK</div>

  <div class="buttons">
    <button id="defaultBtn" class="active" onclick="loadResults(this)">Main</button>
    <button onclick="showIndividual(this)">Egyéni</button>
    <button onclick="showTeams(this)">Konstruktőri</button>
    <button>Statisztikák</button>
    <button onclick="showRaces(this)">Versenyek</button>
  </div>
  <div id="raceButtons" style="display:none; margin-top:20px;"></div>
</div>

<div class="wrapper">
<table>
<thead>
<tr>
<th>#</th>
<th>Név</th>
<th>Csapat</th>
<th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>R5</th><th>R6</th>
<th>R7</th><th>R8</th><th>R9</th><th>R10</th><th>R11</th><th>R12</th>
<th>Pont</th>
<th>Gain</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="footer">Utolsó módosítás: 2026. 04. 26. | 18:02</div>

<script>
let pointsMap = {};
let currentData = [];

function setActive(btn){
 document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
 btn.classList.add("active");
}

function hideRaceButtons(){
 document.getElementById("raceButtons").style.display="none";
}

function updateHeader(cols){
 let tr=document.querySelector("thead tr");
 tr.innerHTML = cols.map(c=>`<th>${c}</th>`).join("");
}

function loadPoints(){
 return fetch("pontrendszer.csv")
  .then(r=>r.text())
  .then(t=>{
    t.trim().split("\n").forEach(line=>{
      let [pos, pts] = line.split(",");
      pointsMap[pos.trim()] = parseInt(pts);
    });
  });
}

function loadResults(btn){
 setActive(btn);

 fetch("F1Challenge_results.csv")
 .then(r=>r.text())
 .then(t=>{
   let data = t.trim().split("\n").map(r=>{
     let cols = r.split(",");
     let name = cols[0];
     let team = cols[1];
     let results = cols.slice(2,14);

     let total = 0;

     results.forEach(res=>{
       if(res === "" || res === undefined) return;
       total += pointsMap[res?.trim()] ?? 0;
     });

     return {name, team, results, total};
   });

   data.sort((a,b)=>b.total-a.total);

   currentData = data;
   renderTable(data,"main");
   hideRaceButtons();
   updateHeader(["#","Név","Csapat","R1","R2","R3","R4","R5","R6","R7","R8","R9","R10","R11","R12","Pont","Gain"]);
 });
}

function renderTable(data, mode="main"){
 let tbody = document.getElementById("tbody");
 tbody.innerHTML="";

 data.forEach((d,i)=>{
   let tr = document.createElement("tr");
   /* tr.className="row"; */
   let rankClass = i<3 ? `rank-${i+1}` : "";

   if (mode === "main"){
    let races = "";
    for(let j=0;j<12;j++){
      races += `<td>${d.results[j] || "-"}</td>`;
    }

    tr.innerHTML = `
    <td class="${rankClass}">${i+1}</td>
    <td class="name"><img src="https://flagcdn.com/w20/hu.png" style="vertical-align:middle;margin-right:6px;">${d.name}</td>
    <td>${d.team}</td>
    ${races}
    <td>${d.total}</td>
    <td>0</td>
    `;
  }

  if(mode === "individual"){
     tr.innerHTML = `
     <td class="${rankClass}">${i+1}</td>
     <td class="name"><img src="https://flagcdn.com/w20/hu.png" style="margin-right:6px;">${d.name}</td>
     <td>${d.team}</td>
     <td>${d.total}</td>
     <td>0</td>`;
   }

    tbody.appendChild(tr);
 });
}

function showIndividual(btn){
 setActive(btn);
 hideRaceButtons();

 let sorted = [...currentData].sort((a,b)=>b.total-a.total);
 renderTable(sorted,"individual");

 updateHeader(["#","Név","Csapat","Pont","Gain"]);
}

function showTeams(btn){
 setActive(btn);

 hideRaceButtons();

 let teams = {};

 currentData.forEach(d=>{
   if(!teams[d.team]){
     teams[d.team] = {players:[], total:0};
   }
   teams[d.team].players.push(d.name);
   teams[d.team].total += d.total;
 });

 let arr = Object.entries(teams).map(([team,data])=>({
   team,
   players:data.players,
   total:data.total
 }));

 arr.sort((a,b)=>b.total-a.total);

 let tbody = document.getElementById("tbody");
 tbody.innerHTML="";

 arr.forEach((t,i)=>{
   let tr=document.createElement("tr");

   tr.innerHTML=`
   <td>${i+1}</td>
   <td>${t.team}</td>
   <td style="text-align:left">${t.players.join("<br>")}</td>
   <td>${t.total}</td>
   `;

   tbody.appendChild(tr);
 });

 updateHeader(["#","Csapat","Pilóták","Pont"]);
}

function showRaces(btn){
 setActive(btn);
 showRaceButtons();
}

function showRaceButtons(){
 let div=document.getElementById("raceButtons");
 div.style.display="block";
 div.innerHTML="";

 for(let i=0;i<12;i++){
   let b=document.createElement("button");
   b.innerText="R"+(i+1);

   b.onclick=()=>{
     let data=[...currentData].map(d=>{
       return {
         name:d.name,
         team:d.team,
         pos:d.results[i]
       };
     });

     data.sort((a,b)=>{
       if(!a.pos) return 1;
       if(!b.pos) return -1;
       return a.pos-b.pos;
     });

     let tbody=document.getElementById("tbody");
     tbody.innerHTML="";

     data.forEach((d,i)=>{
       let tr=document.createElement("tr");
       tr.innerHTML=`
       <td>${i+1}</td>
       <td class="name">${d.name}</td>
       <td>${d.team}</td>
       <td>${d.pos || "-"}</td>
       `;
       tbody.appendChild(tr);
     });

     updateHeader(["#","Név","Csapat","Pozíció"]);
   };

   div.appendChild(b);
 }
}

window.onload = async ()=>{
 await loadPoints();
 loadResults(document.getElementById("defaultBtn"));
};
</script>

</body>
</html>
