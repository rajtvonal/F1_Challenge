<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>F1 Challenge Results</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://rajtvonal.github.io/F1_Challenge/style.css">
</head>

<body>

<div class="bg-glow"></div>

<div class="back-button" onclick="goBack()">
  ← Vissza
</div>
<div class="theme-toggle" onclick="toggleTheme()">
  🌙
</div>

<div class="header">
  <div class="title">Rajtvonal <span>F1 Challenge</span></div>
  <div class="subtitle">EREDMÉNYEK</div>

  <div class="buttons">
    <button id="defaultBtn" class="active" onclick="loadResults(this)">Main</button>
    <button onclick="showIndividual(this)">Egyéni</button>
    <button onclick="showTeams(this)">Konstruktőri</button>
    <button>Statisztikák</button>
    <button onclick="showRaces(this)">Versenyek</button>
  </div>
  <div id="raceButtons" style="display:none; margin-top:20px;"></div>
</div>

<div class="wrapper">
<table>
<thead>
<tr>
<th>#</th>
<th>Név</th>
<th>Csapat</th>
<th>R1</th><th>R2</th><th>R3</th><th>R4</th><th>R5</th><th>R6</th>
<th>R7</th><th>R8</th><th>R9</th><th>R10</th><th>R11</th><th>R12</th>
<th>Pont</th>
<th>Gain</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="footer">
  Utolsó módosítás: 2026. 04. 27. | 15:15
</div>

<script src="script.js"></script>
</body>
</html>
