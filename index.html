<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Rajtvonal F1 Challenge</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://rajtvonal.github.io/F1_Challenge/mindenstyle.css">

<style>
:root {
  --bg-primary: #0a0a12;
  --bg-secondary: #10101e;
  --bg-row: #12122a;
  --bg-row-alt: #0e0e22;
  --red: #db0a40;
  --red-glow: rgba(219,10,64,0.3);
  --yellow: #ffc906;
  --text-primary: #f0f0f5;
  --text-secondary: #8888aa;
  --border: #1e1e3a;
}

.menu {
  max-width: 600px;
  margin: 40px auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
  z-index: 1;
  position: relative;
}

.menu a {
  display: block;
  text-decoration: none;
}

.menu button {
  width: 100%;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: white;
  padding: 20px;
  border-radius: 10px;
  font-size: 20px;
  font-weight: 800;
  cursor: pointer;
  transition: 0.25s;
}

.menu button:hover {
  border-color: var(--red);
  background: #1a1a3a;
  transform: translateY(-2px);
}

</style>
</head>

<body>

<div class="bg-glow anaimate"></div>

<div class="theme-toggle" onclick="toggleTheme()">
  🌙
</div>

<div class="header">
  <div class="title">Rajtvonal <span>F1 Challenge</span></div>
  <div class="subtitle">FŐMENÜ</div>
</div>

<div class="menu">
  <a href="elokvali/"><button>Előkvalifikáció</button></a>
  <a href="szabalyzat/"><button>Szabályzat</button></a>
  <a href="versenynaptar/"><button>Versenynaptár</button></a>
  <a href="verseny-beallitasok/"><button>Verseny Beállítások</button></a>
  <a href="eredmenyek/"><button>Eredmények</button></a>  
</div>

<div class="footer">
  Rajtvonal F1 Challenge • 2026
</div>

<script src="script.js"></script>
</body>
</html>
