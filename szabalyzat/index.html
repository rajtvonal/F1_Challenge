<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>F1 Challenge Szabályzat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a12;
  --bg-secondary: #10101e;
  --red: #db0a40;
  --red-glow: rgba(219,10,64,0.3);
  --text-primary: #f0f0f5;
  --text-secondary: #8888aa;
  --border: #1e1e3a;
}

/* BASE */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* Glow anim */
.bg-glow {
  position: fixed;
  top: -300px;
  left: 50%;
  transform: translateX(-50%);
  width: 1000px;
  height: 700px;
  background: radial-gradient(ellipse, var(--red-glow) 0%, transparent 70%);
  animation: glowMove 18s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes glowMove {
  0% { transform: translateX(-50%) translateY(0px); opacity: 0.6; }
  100% { transform: translateX(-55%) translateY(-40px); opacity: 1; }
}

/* HEADER */
.header {
  text-align: center;
  padding: 80px 20px 30px;
  position: relative;
  z-index: 1;
}

.title {
  font-size: 3rem;
  font-weight: 900;
  color: var(--red);
  text-transform: uppercase;
}

.title span {
  color: var(--text-primary);
  text-shadow: 0 0 40px var(--red-glow);
}

/* CONTENT */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

.content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease;
}

/* LEVEL 1 */
.rule-1 {
  margin-top: 40px;
}

.rule-1-title {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--red);
  margin-bottom: 10px;
}

/* LEVEL 2 */
.rule-2 {
  margin-left: 20px;
  margin-top: 20px;
}

.rule-2-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text-primary);
}

/* LEVEL 3 */
.rule-3 {
  margin-left: 40px;
  margin-top: 15px;
}

.rule-3-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-secondary);
}

.toggle {
  cursor: pointer;
  position: relative;
}

.toggle::after {
  content: "▼";
  position: absolute;
  right: -20px;
  font-size: 10px;
  color: var(--text-secondary);
  transition: 0.2s;
}

.collapsed > .toggle::after {
  content: "▶";
}

/* TEXT */
.rule-text {
  margin-top: 6px;
  font-size: 0.9rem;
  line-height: 1.5;
  color: #cfcfe8;
}


.search-box {
  margin-top: 30px;
}

.search-box input {
  width: 100%;
  max-width: 400px;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: white;
  outline: none;
}

.search-box input:focus {
  border-color: var(--red);
}

.highlight {
  background: rgba(219,10,64,0.25);
  color: #fff;
  padding: 1px 3px;
  border-radius: 4px;
}

.no-results {
  margin-top: 30px;
  color: var(--text-secondary);
  text-align: center;
  display: none;
}


/* Footer */
.footer {
  text-align: center;
  margin: 60px 0;
  font-size: 11px;
  color: var(--text-secondary);
}
</style>
</head>


<body>

<div class="bg-glow"></div>

<div class="header">
  <div class="title">F1 Challenge <span>Szabályzat</span></div>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Keresés a szabályzatban...">
</div>

<div class="container">
<div id="noResults" class="no-results">Nincs találat</div>
  <!-- 1 -->
  
  <div class="rule level-1">
  <div class="toggle">1. Versenyszabályok</div>

  <div class="content">
    <div class="rule level-2">
      <div class="toggle">1.1 Tiszta versenyzés</div>

      <div class="content">
        <div class="rule level-3">
          <div class="toggle">1.1.1</div>
          <div class="content">
            <p>Mindig a tiszta versenyzés a fő szempont...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
  </div>




<div class="footer">
  Rajtvonal F1 Challenge • Szabályzat
</div>

</body>
</html>

<script>
// --- INIT: minden zárva ---
document.querySelectorAll(".rule").forEach(r => r.classList.add("collapsed"));
document.querySelectorAll(".content").forEach(c => c.style.maxHeight = null);

// --- TOGGLE ---
function closeAllChildren(parent){
  parent.querySelectorAll(".rule").forEach(child => {
    child.classList.add("collapsed");
    const c = child.querySelector(":scope > .content");
    if(c) c.style.maxHeight = null;
  });
}

document.querySelectorAll(".toggle").forEach(toggle => {
  toggle.addEventListener("click", () => {
    const parent = toggle.parentElement;
    const content = parent.querySelector(":scope > .content");

    if(!content) return;

    if(parent.classList.contains("collapsed")){
      parent.classList.remove("collapsed");
      content.style.maxHeight = content.scrollHeight + "px";
    } else {
      parent.classList.add("collapsed");
      content.style.maxHeight = null;
      closeAllChildren(parent);
    }
  });
});

// --- HIGHLIGHT HELPER ---
function highlight(text, search){
  if(!search) return text;
  const regex = new RegExp(`(${search})`, "gi");
  return text.replace(regex, `<span class="highlight">$1</span>`);
}

// --- KERESŐ ---
const searchInput = document.getElementById("search");
const noResults = document.getElementById("noResults");

searchInput.addEventListener("input", function(){
  const value = this.value.toLowerCase().trim();
  let found = false;

  document.querySelectorAll(".rule").forEach(rule => {
    const originalText = rule.innerText;
    const text = originalText.toLowerCase();

    // highlight reset
    rule.querySelectorAll(".highlight").forEach(el=>{
      el.outerHTML = el.innerText;
    });

    if(value === "" || text.includes(value)){
      rule.style.display = "block";

      // highlight
      if(value !== ""){
        rule.innerHTML = highlight(rule.innerHTML, value);
      }

      // szülők lenyitása
      let parent = rule.parentElement;
      while(parent){
        if(parent.classList?.contains("rule")){
          parent.classList.remove("collapsed");
          const c = parent.querySelector(":scope > .content");
          if(c) c.style.maxHeight = c.scrollHeight + "px";
        }
        parent = parent.parentElement;
      }

      found = true;
    } else {
      rule.style.display = "none";
    }
  });

  noResults.style.display = found ? "none" : "block";
});

// --- CTRL + F OVERRIDE ---
document.addEventListener("keydown", function(e){
  if((e.ctrlKey || e.metaKey) && e.key === "f"){
    e.preventDefault();
    searchInput.focus();
  }
});
</script>
