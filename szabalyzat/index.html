<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>F1 Challenge Szabályzat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a12;
  --bg-secondary: #10101e;
  --red: #db0a40;
  --red-glow: rgba(219,10,64,0.3);
  --text-primary: #f0f0f5;
  --text-secondary: #8888aa;
  --border: #1e1e3a;
}

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
}

.bg-glow {
  position: fixed;
  top: -300px;
  left: 50%;
  transform: translateX(-50%);
  width: 1000px;
  height: 700px;
  background: radial-gradient(ellipse, var(--red-glow) 0%, transparent 70%);
  animation: glowMove 18s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes glowMove {
  0% { transform: translateX(-50%) translateY(0px); opacity: 0.6; }
  100% { transform: translateX(-55%) translateY(-40px); opacity: 1; }
}

.header {
  text-align: center;
  padding: 80px 20px 30px;
  z-index: 1;
  position: relative;
}

.title {
  font-size: 3rem;
  font-weight: 900;
  color: var(--red);
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

.rule {
  margin-top: 10px;
}

.rule .toggle {
  cursor: pointer;
  font-weight: bold;
  position: relative;
}

.toggle::after {
  content: "▼";
  position: absolute;
  right: -18px;
  font-size: 10px;
}

.collapsed > .toggle::after {
  content: "▶";
}

.content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
}

/* SZINTEK  */
/* LEVEL 1 */
.level-1 > .toggle {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--red);
  margin-top: 25px;
  letter-spacing: 0.5px;
}

/* LEVEL 2 */
.level-2 > .toggle {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-top: 15px;
}

/* LEVEL 3 */
.level-3 > .toggle {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-top: 10px;
}

/* SZÖVEG */
.rule-text {
  font-size: 0.85rem;
  line-height: 1.6;
  color: #cfcfe8; /* nem fakul bele */
  margin-top: 6px;
}

/* BEHÚZÁSOK */
.level-2 { margin-left: 20px; }
.level-3 { margin-left: 40px; }

/* HOVER (extra UX) */
.toggle:hover {
  color: var(--red);
}

/* NYÍL finomhangolás */
.toggle::after {
  font-size: 11px;
  opacity: 0.7;
}

.search-box {
  text-align: center;
  margin: 20px;
}

.search-box input {
  width: 300px;
  padding: 10px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: white;
  border-radius: 6px;
}

.highlight {
  background: rgba(219,10,64,0.25);
  border-radius: 4px;
  padding: 1px 3px;
}

.no-result {
  text-align: center;
  color: var(--red);
  margin-top: 20px;
  display: none;
}
</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="header">
  <div class="title">F1 Challenge Szabályzat</div>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Keresés... (Ctrl+F)">
</div>

<div class="container" id="rules">

<!-- 1 -->
<div class="rule level-1 collapsed">
  <div class="toggle">1. Versenyszabályok</div>
  <div class="content">

    <div class="rule level-2 collapsed">
      <div class="toggle">1.1 Tiszta versenyzés</div>
      <div class="content">

        <div class="rule level-3 collapsed">
          <div class="toggle">1.1.1</div>
          <div class="content">
            <div class="rule-text">
              Mindig a tiszta versenyzés a fő szempont...
            </div>
          </div>
        </div>

        <div class="rule level-3 collapsed">
          <div class="toggle">1.1.2</div>
          <div class="content">
            <div class="rule-text">
              Az agresszív szabályszegés kizárást vonhat maga után.
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="rule level-2 collapsed">
      <div class="toggle">1.2 Pályán való küzdelem</div>
      <div class="content">

        <div class="rule level-3 collapsed">
          <div class="toggle">1.2.1</div>
          <div class="content"><div class="rule-text">Ne legyél agresszív...</div></div>
        </div>

        <div class="rule level-3 collapsed">
          <div class="toggle">1.2.2</div>
          <div class="content"><div class="rule-text">Ne szoríts le mást...</div></div>
        </div>

      </div>
    </div>

  </div>
</div>

</div>

<div class="no-result" id="noResult">Nincs találat</div>

<script>

// toggle működés
function closeChildren(parent){
  parent.querySelectorAll(".rule").forEach(r=>{
    r.classList.add("collapsed");
    const c = r.querySelector(":scope > .content");
    if(c) c.style.maxHeight = null;
  });
}

document.querySelectorAll(".toggle").forEach(t=>{
  t.addEventListener("click", ()=>{
    const p = t.parentElement;
    const c = p.querySelector(":scope > .content");

    if(!c) return;

    if(p.classList.contains("collapsed")){
      p.classList.remove("collapsed");
      c.style.maxHeight = c.scrollHeight + "px";
    } else {
      p.classList.add("collapsed");
      c.style.maxHeight = null;
      closeChildren(p);
    }
  });
});

// keresés
const input = document.getElementById("search");
const noResult = document.getElementById("noResult");

input.addEventListener("input", function(){
  const val = this.value.toLowerCase();
  let found = false;

  document.querySelectorAll(".rule-text").forEach(el=>{
    const text = el.innerText;
    el.innerHTML = text;

    if(text.toLowerCase().includes(val) && val !== ""){
      found = true;

      const regex = new RegExp(`(${val})`, "gi");
      el.innerHTML = text.replace(regex, `<span class="highlight">$1</span>`);

      let parent = el.closest(".rule");
      while(parent){
        parent.style.display = "block";
        parent.classList.remove("collapsed");
        const c = parent.querySelector(":scope > .content");
        if(c) c.style.maxHeight = c.scrollHeight + "px";
        parent = parent.parentElement.closest(".rule");
      }

    } else if(val !== ""){
      el.closest(".rule").style.display = "none";
    } else {
      el.closest(".rule").style.display = "block";
    }
  });

  noResult.style.display = found || val==="" ? "none" : "block";
});

// ctrl+f override
document.addEventListener("keydown", e=>{
  if(e.ctrlKey && e.key === "f"){
    e.preventDefault();
    input.focus();
  }
});
</script>

</body>
</html>
