<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>F1 Challenge Szabályzat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg-primary: #0a0a12;
  --bg-secondary: #10101e;
  --red: #db0a40;
  --red-glow: rgba(219,10,64,0.3);
  --text-primary: #f0f0f5;
  --text-secondary: #8888aa;
  --border: #1e1e3a;
}

/* BASE */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
}

/* Glow anim */
.bg-glow {
  position: fixed;
  top: -300px;
  left: 50%;
  transform: translateX(-50%);
  width: 1000px;
  height: 700px;
  background: radial-gradient(ellipse, var(--red-glow) 0%, transparent 70%);
  animation: glowMove 18s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes glowMove {
  0% { transform: translateX(-50%) translateY(0px); opacity: 0.6; }
  100% { transform: translateX(-55%) translateY(-40px); opacity: 1; }
}

/* HEADER */
.header {
  text-align: center;
  padding: 80px 20px 30px;
  position: relative;
  z-index: 1;
}

.title {
  font-size: 3rem;
  font-weight: 900;
  color: var(--red);
  text-transform: uppercase;
}

.title span {
  color: var(--text-primary);
  text-shadow: 0 0 40px var(--red-glow);
}

/* CONTENT */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
  position: relative;
  z-index: 1;
}

/* LEVEL 1 */
.level-1 {
  margin-top: 40px;
}

.level-1-title {
  font-size: 1.6rem;
  font-weight: 900;
  color: var(--red);
  margin-bottom: 10px;
}

/* LEVEL 2 */
.level-2 {
  margin-left: 20px;
  margin-top: 20px;
}

.level-2-title {
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--text-primary);
}

/* LEVEL 3 */
.level-3 {
  margin-left: 40px;
  margin-top: 15px;
}

.level-3-title {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-secondary);
}

/* TEXT */
.level-text {
  margin-top: 6px;
  font-size: 0.9rem;
  line-height: 1.5;
  color: #cfcfe8;
}


.back-button {
  position: fixed;
  top: 30px;
  left: 30px;
  padding: 10px 16px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  z-index: 999;
  transition: all 0.2s ease;
}

/* hover */
.back-button:hover {
  color: var(--red);
  border-color: var(--red);
  box-shadow: 0 0 12px var(--red-glow);
  transform: translateY(-1px);
}

/* click effect */
.back-button:active {
  transform: scale(0.95);
}


.search-box {
  text-align: center;
  margin: 60px 0;
  margin: 20px;
}
.search-box input {
  width: 300px;
  padding: 10px;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  color: white;
  border-radius: 6px;
}
.highlight {
  background: rgba(219,10,64,0.25);
  border-radius: 4px;
  padding: 1px 3px;
}
.no-result {
  text-align: center;
  color: var(--red);
  margin-top: 20px;
  display: none;
}



/* Footer */
.footer {
  text-align: center;
  margin: 60px 0;
  font-size: 11px;
  color: var(--text-secondary);
}
</style>
</head>


<body>

<div class="bg-glow"></div>

<div class="back-button" onclick="goBack()">
  ← Vissza
</div>

<div class="header">
  <div class="title">F1 Challenge <span>Szabályzat</span></div>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Keresés... (Ctrl+F)">
</div>


<div class="container"></div>


<div class="no-result" id="noResult">Nincs találat</div>

<div class="footer">
  Rajtvonal F1 Challenge • Szabályzat
</div>

</body>
</html>

<script>

function goBack(){ window.location.href = "../"; }

// SZABÁLYZAT BETÖLTÉSE
fetch("rules.txt")
  .then(res => res.text())
  .then(text => generateRules(text));

function generateRules(text){
  const container = document.querySelector(".container");
  container.innerHTML = "";

  const lines = text.split("\n");

  let currentL1 = null;
  let currentL2 = null;
  let currentL3 = null;

  lines.forEach(rawLine => {
    const line = rawLine.trim();
    if(line === "") return;

    // --- LEVEL 1 ---
    if(/^\d+\.\s/.test(line)){
      currentL1 = createDiv("level-1");
      currentL1.innerHTML = `
        <div class="level-1-title">${line}</div>
      `;
      container.appendChild(currentL1);

      currentL2 = null;
      currentL3 = null;
      return;
    }

    // --- LEVEL 2 ---
    if(/^\d+\.\d+\s/.test(line)){
      if(!currentL1) return;

      currentL2 = createDiv("level-2");
      currentL2.innerHTML = `
        <div class="level-2-title">${line}</div>
      `;
      currentL1.appendChild(currentL2);

      currentL3 = null;
      return;
    }

    // --- LEVEL 3 ---
    if(/^\d+\.\d+\.\d+$/.test(line)){
      if(!currentL2) return;

      currentL3 = createDiv("level-3");
      currentL3.innerHTML = `
        <div class="level-3-title">${line}</div>
      `;
      currentL2.appendChild(currentL3);
      return;
    }

    // --- SIMA SZÖVEG ---
    const textDiv = `<div class="level-text">${line}</div>`;

    if(currentL3){
      currentL3.innerHTML += textDiv;
    } else if(currentL2){
      currentL2.innerHTML += textDiv;
    } else if(currentL1){
      currentL1.innerHTML += textDiv;
    }
  });
}

function createDiv(className){
  const div = document.createElement("div");
  div.className = className;
  return div;
}

// SEARCH BOX
const input = document.getElementById("search");
const noResult = document.getElementById("noResult");

input.addEventListener("input", function(){
  const val = this.value.toLowerCase().trim();
  let found = false;

  const allBlocks = document.querySelectorAll(".level-1, .level-2, .level-3");

  // RESET
  document.querySelectorAll(".level-text, .level-1-title, .level-2-title, .level-3-title")
    .forEach(el => {
      el.innerHTML = el.innerText;
    });

  allBlocks.forEach(b => b.style.display = "block");

  if(val === ""){
    noResult.style.display = "none";
    return;
  }

  allBlocks.forEach(block => {
    const text = block.innerText.toLowerCase();

    if(text.includes(val)){
      found = true;

      // highlight
      block.querySelectorAll(".level-text, .level-1-title, .level-2-title, .level-3-title")
        .forEach(el => {
          const original = el.innerText;
          const regex = new RegExp(`(${val})`, "gi");
          el.innerHTML = original.replace(regex, `<span class="highlight">$1</span>`);
        });

    } else {
      block.style.display = "none";
    }
  });

  noResult.style.display = found ? "none" : "block";
});

// Ctrl+F override
document.addEventListener("keydown", e=>{
  if(e.ctrlKey && e.key === "f"){
    e.preventDefault();
    input.focus();
  }
});

</script>
